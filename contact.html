<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Safaraj Digital Services</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        nav { 
            background: rgba(255,255,255,0.2); 
            backdrop-filter: blur(20px); 
            padding: 15px 0; 
            border-radius: 20px; 
            margin-bottom: 40px; 
            position: absolute; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
        }
        .nav-container { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .nav-link { 
            color: white; 
            text-decoration: none; 
            padding: 12px 24px; 
            border-radius: 25px; 
            background: rgba(255,255,255,0.2); 
            transition: all 0.3s; 
            font-weight: 500; 
        }
        .nav-link:hover { 
            background: rgba(255,255,255,0.4); 
            transform: translateY(-2px); 
        }
        .container { 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(20px); 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.18); 
            padding: 40px; 
            max-width: 500px; 
            width: 100%; 
            box-shadow: 0 25px 45px rgba(0,0,0,0.1); 
        }
        .header { text-align: center; margin-bottom: 30px; }
        .title { 
            font-size: 1.8rem; 
            font-weight: 700; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 10px; 
        }
        .contact-subtitle { font-size: 1.1rem; color: rgba(255,255,255,0.9); }
        form { display: flex; flex-direction: column; gap: 20px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea { 
            padding: 18px 20px; 
            border: none; 
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.4); 
            font-size: 16px; 
        }
        textarea { height: 120px; }
        .send-btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            font-size: 18px; 
            padding: 18px; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
        }
        footer { 
            text-align: center; 
            color: rgba(255,255,255,0.9); 
            padding: 20px; 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="services.html" class="nav-link">Services</a>
        <a href="contact.html" class="nav-link" style="background: rgba(255,255,255,0.3);">Contact</a>
        <a href="portfolio.html" class="nav-link">Portfolio</a>
    </div>
</nav>

<div class="container">
    <div class="header">
        <h1 class="title">Contact Us</h1>
        <div class="contact-subtitle">Get in touch with Safaraj Digital Services</div>
    </div>

    <form>
        <div class="row">
            <input type="text" placeholder="Your Name" required>
            <input type="tel" placeholder="Phone Number" required>
        </div>
        <input type="email" placeholder="Email Address" required>
        <textarea placeholder="Your Message"></textarea>
        <button class="send-btn">Send Message</button>
    </form>
</div>

<footer>
    <p>© 2026 Safaraj Digital Services | Jaipur Kalna, Berhampore, West Bengal</p>
</footer>

</body>
</html>
